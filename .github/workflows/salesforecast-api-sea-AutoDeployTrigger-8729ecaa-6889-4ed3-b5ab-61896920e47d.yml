name: Trigger auto deployment for salesforecast-api-sea

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/salesforecast-api-sea-AutoDeployTrigger-8729ecaa-6889-4ed3-b5ab-61896920e47d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SALESFORECASTAPISEA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SALESFORECASTAPISEA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SALESFORECASTAPISEA_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: forecastdemoacr-ftageqa3aybmdqgv.azurecr.io
          registryUsername: ${{ secrets.SALESFORECASTAPISEA_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.SALESFORECASTAPISEA_REGISTRY_PASSWORD }}
          containerAppName: salesforecast-api-sea
          resourceGroup: sales-forecast-vpn
          imageToBuild: forecastdemoacr-ftageqa3aybmdqgv.azurecr.io/salesforecast-api-sea:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


